name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Stage 1 — initial checks
  check:
    name: make check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: make check

  docs:
    name: make docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: make docs


  # Stage 2 — Only runs once every Stage 1 checks are green.
  ubuntu-tests:
    name: ubuntu / torch=${{ matrix.torch }} / ${{ matrix.speed }}
    needs: [check, docs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        torch: [lowest, highest]
        speed: [fast, slow]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Run tests
        run: |
          if [ "${{ matrix.speed }}" = "slow" ]; then MARKER="slow"; else MARKER="not slow"; fi
          make test-${{ matrix.torch }}-pytorch PYTEST_ARGS="--marker '$MARKER' --junit"
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-ubuntu-${{ matrix.torch }}-${{ matrix.speed }}
          path: test-results/
          if-no-files-found: ignore

  macos-tests:
    name: macos / torch=highest / ${{ matrix.speed }}
    needs: [check, docs]
    if: github.repository_owner == 'apple'
    runs-on: [self-hosted, macos]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        speed: [fast, slow]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Run tests
        run: |
          if [ "${{ matrix.speed }}" = "slow" ]; then MARKER="slow"; else MARKER="not slow"; fi
          make test-highest-pytorch PYTEST_ARGS="--marker '$MARKER' --junit"
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-macos-highest-${{ matrix.speed }}
          path: test-results/
          if-no-files-found: ignore
